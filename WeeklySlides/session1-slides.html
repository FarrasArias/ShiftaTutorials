# What is Creative Coding?

.big[Code as .accent[medium],<br>not just tool.]

--

Traditional programming: solve a defined problem → one correct answer.

Creative coding: explore a space of possibilities → many interesting answers.

--

> John Maeda's philosophy:
> *Designers should learn to code. The computer shouldn't just be used to draw a line (making), but to write the logic that generates the line.*

???
Ask students: have they used code creatively before?
What made them sign up for this course?

---

# What is Generative Art?

Artwork where the artist **defines a system** (an algorithm, a set of rules) and the system **produces the work.**

--

The artist:
- Sets the rules
- Defines the parameters
- Accepts some degree of **unpredictability**

--

.box[
**The interesting part:** the output can surprise even the author.
The system takes on a life of its own.
]

???
Good analogy: a composer writes music, but the orchestra plays it differently each time. The score is the algorithm.

---

# A Brief History

.col-left[
**1960s: The Pioneers**

Vera Molnár, Frieder Nake, Harold Cohen: programming plotters to draw.

No GUIs. Just punched cards and plotters.

**1970–80s: Algorithmic Art**

Mathematical functions, fractals, L-systems. 
Conway's Game of Life: https://playgameoflife.com/ <br />
Mandelbrot set (1978): https://mandelbrot.site/
```javascript
Z = Z^2 + C
```

**1990s: Net Art & Interactivity**

The web as canvas. Real-time, participatory.
]

.col-right[
**2000s: Processing**

Casey Reas + Ben Fry create Processing.
Code as sketchbook. Art school meets CS.

**2013: p5.js**

Lauren McCarthy creates p5.js: Processing for the browser.

**Now**

Generative AI, machine learning aesthetics, real-time everything.
]

# Your First Sketch

Every new p5.js sketch starts like this:

```javascript
function setup() {
  createCanvas(400, 400);
}

function draw() {
  background(220);
}
```

Two functions that p5 calls automatically:

- `setup()`: runs **once** when the sketch starts
- `draw()`: runs **over and over**, up to 60 times per second

???

Ask: what do you think `createCanvas` does? What is 220?

# The Canvas: Our World

The p5.js canvas is a **grid of pixels**.

.coord-demo[
    (0,0) ─────────► x <br />
      │   ·    ·    ·    ·    · <br />
      │   ·    ·    ·    ·    · <br />
      │   ·    ·    ·    ·    · <br />
      ▼   ·    ·    ·    ·  (400,400) <br />
     y <br />
]

**Key difference from math class:**
- `x` increases to the **right** ✓
- `y` increases **downward** ✗ (not up!)
- The origin `(0, 0)` is at the **top-left**

???
This trips people up! Draw it on a whiteboard if possible.
Ask: where is the center of a 400x400 canvas? (200, 200)

---

# The Canvas: Our World

.box[
**Center of a 400×400 canvas:** `(200, 200)`

**Bottom-right corner:** `(400, 400)`: but that pixel is *off the canvas*!

Pixels go from `0` to `399` in each direction.

Think of it like apartments in a building: floor 0 exists!
]

--

.box.green[
**Shortcut:** use `width` and `height` built-in variables
instead of hardcoding numbers.

`(width/2, height/2)` = center, whatever the canvas size.
]

# Colors: RGB

In p5.js, colors are described with **three numbers**: Red, Green, Blue.

Each value goes from **0** (none) to **255** (full).

```javascript
background(255, 0, 0);   // pure red
background(0, 255, 0);   // pure green
background(0, 0, 255);   // pure blue

background(0);           // black (shorthand for 0, 0, 0)
background(255);         // white (shorthand for 255, 255, 255)
background(128);         // mid grey

background(255, 200, 50); // warm yellow
```

.box[
Think of RGB like mixing light: not paint. Mixing all three at full = white.
]

???
Mixing pigment (paint) and mixing light are different.
Red + Green light = Yellow. This surprises students from design backgrounds.

---

class: code-slide

# Colors: Alpha (Transparency)

A **4th value** controls transparency: from `0` (invisible) to `255` (opaque).

```javascript
// fill(red, green, blue, alpha)
fill(255, 0, 0, 128);   // semi-transparent red
fill(0, 150, 255, 50);  // very transparent blue
```

.box.teal[
**Alpha is powerful** for building up layers, creating depth,
and simulating motion trails.
]

--

**One number only?** That's greyscale.

```javascript
fill(0);        // black
fill(128);      // mid grey
fill(128, 80);  // mid grey, semi-transparent
```

---

class: code-slide

# Drawing: fill() and noStroke()

Before drawing a shape, set its colors:

```javascript
function draw() {
  background(220);

  // Set fill color (inside of shape)
  fill(255, 100, 50);

  // Remove the border/outline
  noStroke();

  // Or set stroke color and thickness
  stroke(0);
  strokeWeight(2);
}
```

.box[
`fill()` sets the inside color.
`stroke()` sets the outline color.
`noStroke()` removes the outline entirely.
`noFill()` makes the inside transparent.
]

---

class: code-slide

# Drawing: Circles and Ellipses

```javascript
function setup() {
  createCanvas(400, 400);
}

function draw() {
  background(30);

  noStroke();
  fill(255, 80, 50);

  // circle(x, y, diameter)
  circle(200, 200, 100);

  // ellipse(x, y, width, height)
  ellipse(200, 200, 150, 80);
}
```

`circle(x, y, diameter)`: center x, center y, diameter

`ellipse(x, y, w, h)`: center x, center y, width, height

???
Draw this live. Change the values. Ask students: how do I make the circle bigger? Move it to a corner?

class: code-slide

# Drawing: Rectangles and Lines

```javascript
// rect(x, y, width, height)
// x, y = TOP-LEFT corner
rect(50, 50, 100, 80);

// rectMode(CENTER) changes behavior:
// now x, y = CENTER of rectangle
rectMode(CENTER);
rect(200, 200, 100, 80);

// line(x1, y1, x2, y2)
stroke(255);
strokeWeight(2);
line(0, 0, 400, 400);  // diagonal

// point(x, y): a single pixel
point(200, 200);
```

---

class: code-slide

# Drawing Order Matters

Shapes drawn **later** appear **on top**.

```javascript
function draw() {
  background(30);

  // Drawn first = behind
  fill(255, 80, 50);
  noStroke();
  circle(180, 200, 120);

  // Drawn second = in front
  fill(50, 200, 255, 180);
  circle(220, 200, 120);
}
```

.box[
Think of it like layers in Photoshop or Illustrator.
The last thing drawn is always on top.
]

---

class: code-slide

# What is a Variable?

A **variable** is a named container that stores a value.

```javascript
let myName = "Raf"; // String (symbols, text) type
let age = 33; // Int type
let pi = 3.14159; // Float (decimal) type
let isHappy = true; // Boolean (on or off) type
```

--

Why use variables instead of just writing numbers?

1. **Readability**: `circleSize` is clearer than `47`
2. **Reusability**: change one value, affect everything
3. **Computation**: do math with them: `let half = circleSize / 2`
4. **Change over time**: values can update in `draw()`

---

class: code-slide

# Declaring Variables: `let`

```javascript
// Declare a variable with `let`:
let worldSize = 400;
let circleSize = 50;

function setup() {
  // Use the variable:
  createCanvas(worldSize, worldSize);
  background(30);
}

function draw() {
  background(30);
  noStroke();
  fill(255, 80, 50);

  // Use it again:
  circle(200, 200, circleSize);
}
```

.box.green[
Try changing `worldSize` to 600. Both the canvas AND the code adapt.
]

???
Change circleSize and redraw. Show the power of variables.

---

class: code-slide

# `random()`: Controlled Chaos

`random(min, max)` returns a random decimal number between `min` and `max`.

```javascript
let x = random(0, 400);   // somewhere on the x axis
let r = random(0, 255);   // a random red value
let size = random(10, 80); // a random size
```

--

Every time `draw()` runs, `random()` gives a different number.

```javascript
function draw() {
  // This circle moves to a new random position every frame!
  let x = random(0, width);
  let y = random(0, height);
  circle(x, y, 20);
}
```

.box[
`random()` with no arguments returns a number between 0 and 1.
]

.box[
`background()` in `setup()` runs **once**: like setting up a canvas.
`background()` in `draw()` runs **every frame**: clears the previous drawing.
]

class: code-slide

# Step 2: Add a Circle

```javascript
function setup() {
  createCanvas(400, 400);
  background(30);
}

function draw() {
  noStroke();
  fill(255, 80, 50);
  circle(200, 200, 80);
}
```

Notice: no `background()` in `draw()`.
The circle is drawn on top of itself every frame: but since it doesn't move, we don't see it.

# Step 3: Bring in Variables

```javascript
let worldSize = 400;
let circleSize = 50;

function setup() {
  createCanvas(worldSize, worldSize);
  background(30);
}

function draw() {
  let x = worldSize / 2;
  let y = worldSize / 2;

  noStroke();
  fill(255, 80, 50);
  circle(x, y, circleSize);
}
```

Now play: change `circleSize`, change `worldSize`.

# Step 4: Add Randomness + Color

```javascript
let worldSize = 400;
let circleSize = 50;

function setup() {
  createCanvas(worldSize, worldSize);
  background(30);
}

function draw() {
  let x = random(0, worldSize);
  let y = random(0, worldSize);

  let r = random(0, 255);
  let g = random(0, 255);
  let b = random(0, 255);
  let a = random(0, 255);

  circleSize = random(10, 50);

  noStroke();
  fill(r, g, b, a);
  circle(x, y, circleSize);
}
```

???
Run this live. Watch it build up! No background() in draw() = all circles accumulate.
Ask students: what happens if we add background(30) at the start of draw()?

---

# What Just Happened?

```
background()  →  NOT in draw()  →  circles accumulate
random()      →  in draw()      →  different each frame
fill(r,g,b,a) →  with alpha     →  overlapping transparency
draw()        →  loops forever  →  it never stops
```

--

.box[
We wrote ~15 lines of code.

In ~30 seconds of running, it produces an interesting complex image: and it's different every time you run it.

**That's generative art.**
]
