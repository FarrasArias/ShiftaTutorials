# Arrays

## A list you can talk to.

---

# Why Arrays?

Without arrays:
```javascript
let x0 = 50;  let x1 = 120;  let x2 = 200;
let x3 = 280; let x4 = 350;
// ...50 more lines
```

With an array:
```javascript
let positions = [50, 120, 200, 280, 350]; // one line
// Or: generate 500 positions in a loop
```

--

.box[
An array is an **ordered list** — items in a specific sequence, accessed by number (index).
Index starts at **0**, not 1.
]

---

class: code-slide

# Array Basics

```javascript
// Declare an array
let colors = ["red", "green", "blue"];

// Access by index (0-based!)
console.log(colors[0]);  // "red"
console.log(colors[2]);  // "blue"

// Change a value
colors[1] = "yellow";    // ["red", "yellow", "blue"]

// How many items?
console.log(colors.length);  // 3

// Add to the end
colors.push("purple");   // ["red", "yellow", "blue", "purple"]

// Remove from the end
colors.pop();            // ["red", "yellow", "blue"]
```

---

class: code-slide

# Looping Over an Array

Two ways — both valid:

```javascript
let sizes = [20, 45, 10, 80, 35, 60];

// Method 1: index-based (useful when you need i)
for (let i = 0; i < sizes.length; i++) {
  circle(i * 60 + 30, 200, sizes[i]);
}

// Method 2: for...of (cleaner when you just need each item)
for (let s of sizes) {
  circle(random(width), random(height), s);
}
```

.box[
`for...of` reads as: *"for each item `s` in the array `sizes`, do this."*
Use it when you need the value but not the index.
Use the index-based loop when position in the array matters.
]

---

class: code-slide

# Arrays Enable Scale

```javascript
// Without array: draw 5 circles by hand
circle(50,  200, 30);
circle(120, 200, 30);
circle(190, 200, 30);
circle(260, 200, 30);
circle(330, 200, 30);
```

```javascript
// With array + loop: draw 500 circles — same effort
let positions = [];

function setup() {
  createCanvas(600, 600);
  for (let i = 0; i < 500; i++) {
    positions.push({ x: random(width), y: random(height) });
  }
}

function draw() {
  background(20);
  for (let p of positions) {
    circle(p.x, p.y, 8);
  }
}
```

# Objects

## A thing with properties.

---

# What is an Object?

An object groups related values under one name.

```javascript
// Five separate variables — hard to manage
let px = 200;
let py = 300;
let pr = 20;
let pvx = 1.5;
let pvy = -0.8;

// One object — easy to pass around, store, loop over
let particle = {
  x:  200,
  y:  300,
  r:  20,
  vx: 1.5,
  vy: -0.8
};
```

--

Access properties with a dot:

```javascript
particle.x  += particle.vx;
particle.y  += particle.vy;
circle(particle.x, particle.y, particle.r);
```

---

class: code-slide

# Arrays of Objects — The Key Pattern

This is the most important pattern in creative coding:

```javascript
let particles = [];

function setup() {
  createCanvas(400, 400);
  // Create 100 particle objects and store in the array
  for (let i = 0; i < 100; i++) {
    particles.push({
      x:  random(width),
      y:  random(height),
      vx: random(-2, 2),
      vy: random(-2, 2),
      r:  random(4, 16)
    });
  }
}

function draw() {
  background(20, 20, 20, 40);  // ghost trail

  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > width)  p.vx *= -1;
    if (p.y < 0 || p.y > height) p.vy *= -1;
    circle(p.x, p.y, p.r);
  }
}
```

# Classes

## A blueprint. An instruction for building objects.

---

# Objects vs Classes

An **object literal** (`{ x: 100, y: 200 }`) is one specific thing.

A **class** is a *blueprint* — a recipe you can use to create as many objects as you like, all with the same structure but different values.

```javascript
// Object literal — one specific particle
let p = { x: 100, y: 200, vx: 1.5, vy: -0.8 };

// Class — a recipe for making any number of particles
class Particle {
  constructor(x, y) {
    this.x  = x;
    this.y  = y;
    this.vx = random(-2, 2);
    this.vy = random(-2, 2);
  }
}

// Create instances from the blueprint
let p1 = new Particle(100, 200);
let p2 = new Particle(300, 150);
```

---

class: code-slide

# Class Anatomy

```javascript
class Particle {

  // constructor: runs once when you call `new Particle(...)`
  constructor(x, y) {
    this.x  = x;
    this.y  = y;
    this.vx = random(-2, 2);
    this.vy = random(-2, 2);
    this.r  = random(4, 16);
    this.col = color(random(255), 80, 50);
  }

  // Methods: functions that belong to the class
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > width)  this.vx *= -1;
    if (this.y < 0 || this.y > height) this.vy *= -1;
  }

  draw() {
    noStroke();
    fill(this.col);
    circle(this.x, this.y, this.r * 2);
  }
}
```

---

class: code-slide

# Using the Class

```javascript
let particles = [];

function setup() {
  createCanvas(600, 600);

  for (let i = 0; i < 200; i++) {
    particles.push(new Particle(random(width), random(height)));
  }
}

function draw() {
  background(20, 20, 20, 30);

  for (let p of particles) {
    p.update();
    p.draw();
  }
}
```

.box.green[
Classes make it trivially easy to go from 200 to 2000 particles.
They also keep the code organised — `p.update()` and `p.draw()` are self-contained.
]

# Fun Example — Snow

A Snowflake class demonstrates that classes aren't just for technical demos:

```javascript
class Snowflake {
  constructor() {
    this.reset();
  }
  reset() {
    this.x    = random(width);
    this.y    = random(-20, 0);
    this.r    = random(2, 6);
    this.vy   = random(0.5, 2);
    this.drift = random(-0.3, 0.3);
  }
  update() {
    this.y += this.vy;
    this.x += this.drift + noise(this.y * 0.01) * 0.5 - 0.25;
    if (this.y > height + 10) this.reset();  // recycle
  }
  draw() {
    noStroke(); fill(255, 255, 255, 200);
    circle(this.x, this.y, this.r * 2);
  }
}
```

# Data

## The world outside the sketch.

---

# preload() — Loading Assets

p5.js has a special function that runs **before** `setup()`:

```javascript
let myTable;
let myImage;

function preload() {
  // Everything here finishes loading before setup() runs
  myTable = loadTable("data.csv", "csv", "header");
  myImage = loadImage("photo.jpg");
}

function setup() {
  createCanvas(600, 600);
  // myTable and myImage are guaranteed to be ready here
}
```

.box[
**Never load files inside `setup()` or `draw()`.**
Use `preload()` — it pauses the sketch until all assets are ready.
]

---

class: code-slide

# Loading CSV — loadTable()

A `.csv` file is a spreadsheet saved as plain text:

```
name,distance,size,moons
Mercury,0.39,0.38,0
Venus,0.72,0.95,0
Earth,1.00,1.00,1
Mars,1.52,0.53,2
Jupiter,5.20,11.2,95
```

```javascript
let table;

function preload() {
  // "csv" = format, "header" = first row is column names
  table = loadTable("planets.csv", "csv", "header");
}

function setup() {
  createCanvas(600, 600);
  console.log("Rows:", table.getRowCount());
  console.log("Cols:", table.getColumnCount());

  // Read a specific cell: row 0, column "name"
  console.log(table.getString(0, "name"));   // "Mercury"
  console.log(table.getNum(2, "moons"));     // 1
}
```

---

class: code-slide

# Iterating CSV Rows

Convert each row into an object, push to an array:

```javascript
let planets = [];

function preload() {
  table = loadTable("planets.csv", "csv", "header");
}

function setup() {
  createCanvas(600, 600);

  for (let i = 0; i < table.getRowCount(); i++) {
    planets.push({
      name:     table.getString(i, "name"),
      distance: table.getNum(i, "distance"),
      size:     table.getNum(i, "size"),
      moons:    table.getNum(i, "moons")
    });
  }

  console.log(planets);
}
```

.box.green[
Now `planets` is a regular array of objects — use it exactly like the particle systems from earlier.
]

# Loading JSON — loadJSON()

JSON is more flexible than CSV — it handles nested structures:

```json
{
  "title": "My Dataset",
  "items": [
    { "name": "Alpha", "value": 0.72, "tags": ["a", "b"] },
    { "name": "Beta",  "value": 0.38, "tags": ["c"] }
  ]
}
```

```javascript
let data;

function preload() {
  data = loadJSON("dataset.json");
}

function setup() {
  createCanvas(600, 600);
  console.log(data.title);           // "My Dataset"
  console.log(data.items[0].name);   // "Alpha"
  console.log(data.items.length);    // 2

  for (let item of data.items) {
    console.log(item.name, item.value);
  }
}
```

# Loading Images — loadImage() + pixels

```javascript
let img;

function preload() {
  img = loadImage("photo.jpg");
}

function setup() {
  createCanvas(img.width, img.height);
  image(img, 0, 0);  // draw the image at (0,0)
}

function draw() {
  background(20);

  // Pixel art: sample the image at a grid of points
  let step = 8;
  for (let x = 0; x < width; x += step) {
    for (let y = 0; y < height; y += step) {
      let c = img.get(x, y);   // color at pixel (x,y)
      fill(c);
      noStroke();
      circle(x, y, step * 0.8);
    }
  }
}
```

.small[`img.get(x, y)` returns the color at that pixel — use it as a fill or stroke.]

# Data as Creative Material

.box[
We've loaded data as a technical exercise. But data can be the *subject* of the artwork.

Every dataset has a story. The visualization is your interpretation of it.
]

--

Ask yourself:
- What aspect of this data is most surprising or most beautiful?
- What visual property (position, size, color, opacity, motion) best represents each data variable?
- Does your visualization *reveal* something, or just *display* something?

--

> *"The purpose of visualization is insight, not pictures."*
> — Ben Schneiderman

> *"Data is the new oil — and like oil, it needs to be refined before it's useful."*
> — Clive Humby
