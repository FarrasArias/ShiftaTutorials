# Conditionals

## The code makes decisions.

---

class: code-slide

# if / else

```javascript
if (condition) {
  // runs if condition is TRUE
} else {
  // runs if condition is FALSE
}
```

```javascript
function draw() {
  background(30);

  if (mouseX > width / 2) {
    fill(255, 80, 50);    // right half → orange
  } else {
    fill(80, 200, 255);   // left half → blue
  }

  noStroke();
  circle(mouseX, mouseY, 60);
}
```

The condition is a question that has a yes (`true`) or no (`false`) answer.

# Comparison Operators

```javascript
x > 100     // x is greater than 100
x < 100     // x is less than 100
x >= 100    // x is greater than or equal to 100
x <= 100    // x is less than or equal to 100
x === 100   // x is exactly equal to 100
x !== 100   // x is NOT equal to 100
```

```javascript
if (mouseX > width / 2 && mouseY > height / 2) {
  // only bottom-right quadrant
}

if (mouseX < 100 || mouseX > 300) {
  // left zone OR right zone (not the middle)
}

if (!mouseIsPressed) {
  // when the mouse is NOT pressed
}
```

# else if: Multiple branches

```javascript
function draw() {
  background(30);

  let zone;

  if (mouseX < width / 3) {
    zone = "LEFT";
    fill(255, 80, 50);
  } else if (mouseX < (width / 3) * 2) {
    zone = "MIDDLE";
    fill(200, 255, 80);
  } else {
    zone = "RIGHT";
    fill(80, 200, 255);
  }

  noStroke();
  circle(mouseX, height / 2, 60);

  fill(255);
  textSize(14);
  textAlign(CENTER);
  text(zone, mouseX, height / 2 + 50);
}
```

# Conditionals for Boundaries: Wrapping

Without conditionals, a moving object leaves the screen and never comes back.

```javascript
let x = 0;

function setup() { createCanvas(400, 400); }

function draw() {
  background(30);
  x += 2;

  // When x goes past the right edge, reset to the left
  if (x > width) {
    x = 0;
  }

  noStroke();
  fill(255, 80, 50);
  circle(x, height / 2, 40);
}
```

.box[
This is **wrapping**: the object reappears on the other side.
With `x = -40` instead of `0`, it enters smoothly from off-screen.
]

# Loops

## Do it again. And again. And again.

---

class: code-slide

# The for Loop

```javascript
// for (start; condition to keep going; step)
for (let i = 0; i < 10; i++) {
  // this block runs 10 times
  // i = 0, 1, 2, 3 ... 9
  console.log(i);
}
```

Breaking it down:

| Part | What it does |
|---|---|
| `let i = 0` | create a counter, start at 0 |
| `i < 10` | keep looping while this is true |
| `i++` | add 1 to the counter after each loop |
| `{ ... }` | the code that runs each time |

---

class: code-slide

# Drawing a Row of Shapes

```javascript
function setup() {
  createCanvas(400, 400);
}

function draw() {
  background(30);
  noStroke();
  fill(255, 80, 50);

  let count = 8;
  let spacing = width / count;

  for (let i = 0; i < count; i++) {
    let x = spacing * i + spacing / 2;
    circle(x, height / 2, 30);
  }
}
```

Change `count = 8` to `count = 40`: the loop adapts instantly.

.box.green[
The loop variable `i` is available inside the loop body.
Use it to calculate position, color, size: anything that should differ per step.
]

class: code-slide

# Nested Loops: Grids

A loop inside a loop → every combination of row and column:

```javascript
function setup() {
  createCanvas(400, 400);
  background(30);
  noLoop();
}

function draw() {
  let cols = 10;
  let rows = 10;
  let cellW = width / cols;
  let cellH = height / rows;

  noStroke();

  for (let col = 0; col < cols; col++) {
    for (let row = 0; row < rows; row++) {
      let x = col * cellW + cellW / 2;
      let y = row * cellH + cellH / 2;

      fill(col * 25, row * 25, 150);
      circle(x, y, cellW * 0.7);
    }
  }
}
```

???
This generates 100 circles in 5 lines of logic. The power of loops.

---

# Loop Thinking

When you see a pattern with repetition, think:
**"What changes? What stays the same?"**

.col-left[
**What changes per step?**
- Position (most common)
- Color (hue, brightness)
- Size
- Rotation
- Opacity

→ These become expressions using `i`
]
.col-right[
**What stays the same?**
- Shape type
- Stroke weight
- Overall composition

→ These go outside the loop
]
.clearfix[]

--

.box[
The loop variable `i` goes from `0` to `count-1`.
Use `map(i, 0, count-1, startValue, endValue)` to translate it to any range.
]

# Functions

## Name a block of code. Reuse it.

---

# Why Write Functions?

Three reasons:

**1. Don't Repeat Yourself (DRY)**
If you write the same 5 lines 10 times, that's 50 lines. A function = write it once, call it 10 times.

**2. Clarity**
`drawFlower(x, y, size)` is easier to understand than 20 lines of math.

**3. Thinking in pieces**
Break a complex sketch into named actions. Design the structure before the details.

--

> *"Programs must be written for people to read, and only incidentally for machines to execute."*
>: Harold Abelson, *Structure and Interpretation of Computer Programs*

---

class: code-slide

# Defining and Calling a Function

```javascript
// DEFINE the function (the recipe)
function drawTarget(x, y, size) {
  noFill();
  stroke(255, 80, 50);
  strokeWeight(2);
  circle(x, y, size);
  circle(x, y, size * 0.6);
  circle(x, y, size * 0.25);
}

// CALL the function (use the recipe)
function draw() {
  background(30);
  drawTarget(100, 200, 80);
  drawTarget(300, 200, 120);
  drawTarget(200, 350, 50);
}
```

.box[
`x`, `y`, `size` are **parameters**: they let you use the function with different values each time.
]

---

class: code-slide

# Functions with return

A function can compute a value and give it back:

```javascript
// This function calculates a color based on position
function positionToHue(x) {
  return map(x, 0, width, 0, 360);
}

function draw() {
  colorMode(HSB, 360, 100, 100);
  background(0, 0, 10);

  for (let x = 0; x < width; x += 20) {
    let hue = positionToHue(x);
    fill(hue, 80, 90);
    noStroke();
    circle(x, height / 2, 15);
  }
}
```

.box[
`return` sends a value back to wherever the function was called.
The calling code can store it in a variable: `let hue = positionToHue(x);`
]

# Randomness

## What does "random" really mean?

---

# Two Kinds of Random

.col-left[
## White Noise
Every value is completely independent. No relationship between one value and the next.

```javascript
random(0, 100)
// → 72, 14, 89, 3, 55, 41...
// No pattern. No memory.
```

Visual result: static, gravel, TV noise.

.small[Good for: punctual variation, picking one thing from many, rolling a die]
]
.col-right[
## Coherent Noise (Perlin)
Each value is related to its neighbours. The sequence flows smoothly.

```javascript
noise(t)   // t increases slowly
// → 0.51, 0.53, 0.56, 0.58, 0.55...
// Gradual change. Organic feeling.
```

Visual result: clouds, terrain, wood grain.

.small[Good for: organic motion, textures, natural-looking variation]
]
.clearfix[]

---

# Noise Theory: A Bit Deeper

**Perlin Noise** was invented by Ken Perlin in 1983 for the film *Tron*.
He needed a way to make computer graphics look *natural*: not the jagged randomness of `random()`.

.box[
The key insight: **nature doesn't jump**. A mountain doesn't go from 0m to 3000m in one step. A cloud doesn't have sharp edges. Wind speed changes gradually.

Perlin noise models this: neighbouring values are always *similar*, but the overall field is *unpredictable*.
]

--

**Dimensions of noise:**
- **1D noise:** a smooth curve in time. `noise(t)`: use for movement, size, color
- **2D noise:** a smooth texture over a surface. `noise(x, y)`: use for terrain, flow fields, distortion
- **3D noise:** a smooth texture that also evolves over time. `noise(x, y, t)`

---

# Comparing random() and noise()

.col-left[
**`random()`: white noise**

```
█░░▓██▒░█░▒▓█▒░▓█
```

Independent values. No structure. Entropy.

]
.col-right[
**`noise()`: Perlin noise**

```
▒▒▓▓██▓▓▒▒░░▒▒▓▓
```

Smooth transitions. Structure without order. Organic.
]
.clearfix[]

--

.box[
**Rule of thumb:**
- Use `random()` when you want a *single unrelated value* (pick a color, roll a die, place a dot)
- Use `noise()` when you want a *field of related values* (terrain, flowing movement, organic texture)
]

---

class: code-slide

# noise() in p5.js: 1D

`noise(t)` always returns a value between **0 and 1**.

```javascript
let t = 0;

function setup() {
  createCanvas(400, 400);
}

function draw() {
  background(30);

  t += 0.01;   // small step → smooth; large step → jumpy

  let n = noise(t);            // 0 to 1
  let x = n * width;           // map to canvas width
  let size = n * 100 + 10;     // map to size range

  noStroke();
  fill(255, 80, 50);
  circle(x, height / 2, size);
}
```

.box[
The noise value is not random each frame: it's a specific value at position `t` in an infinite noise landscape.
Incrementing `t` slowly walks through that landscape smoothly.
]

---

class: code-slide

# noise(): 2D: Textures

Give `noise()` an x and y position to sample a 2D noise field:

```javascript
function setup() {
  createCanvas(400, 400);
  noLoop();
}

function draw() {
  let scale = 0.008;  // zoom level: smaller = smoother; larger = finer

  for (let x = 0; x < width; x++) {
    for (let y = 0; y < height; y++) {
      let n = noise(x * scale, y * scale); // 0 to 1
      let brightness = n * 255;
      stroke(brightness);
      point(x, y);
    }
  }
}
```

.box[
This looks like clouds or marble. Try changing `scale`: it's like zooming in or out of the noise landscape.
]

.small[Note: pixel-by-pixel loops are slow. This is for illustration: use images or shaders for production.]

---

class: code-slide

# noise(): 3D: Animated Texture

Add a third value that changes over time → the texture animates:

```javascript
let t = 0;

function setup() {
  createCanvas(400, 400);
  background(20);
}

function draw() {
  t += 0.005;
  let scale = 0.01;

  for (let x = 0; x < width; x += 4) {
    for (let y = 0; y < height; y += 4) {
      let n = noise(x * scale, y * scale, t);
      fill(n * 255, n * 150, n * 60, 30);
      noStroke();
      rect(x, y, 4, 4);
    }
  }
}
```

---

class: code-slide

# noiseDetail(): Octaves

`noiseDetail(octaves, falloff)` controls noise complexity:

```javascript
// Default: 4 octaves, 0.5 falloff
noiseDetail(8, 0.5);   // more detail, rougher
noiseDetail(1, 0.5);   // one octave, smoother
```

.box[
**Octaves** = layers of noise at different scales added together.
More octaves = more detail (like adding fine texture on top of coarse).

**Falloff** = how much each octave contributes.
Lower = coarser octaves dominate; higher = finer detail is more prominent.
]

# Stochastic Systems

A **stochastic system** is one where randomness plays a role at every step: yet produces recognisable, structured output.

Examples:
- **AARON** (Harold Cohen, 1973–): a program that makes paintings. Its rules govern composition; `random()` handles details. No two paintings are alike, but all are clearly "AARON paintings."
- **L-Systems**: plant growth described as rules + random branching angles
- **Noise flows**: particles that follow a vector field driven by Perlin noise (Refik Anadol, Casey Reas)

.box[
The key insight: **randomness is a parameter, not a replacement for design**.
You design the *space* of possible outputs. Random picks *which* output appears.
]
